<form id="settings-form" class="settings-form" hx-post="/settings" hx-swap="outerHTML">
  {% if saved %}<p class="form-status saved" role="status">Settings saved.</p>{% endif %}
  {% if error %}<p class="form-status error" role="alert">{{ error }}</p>{% endif %}
  <label class="field">
    <span class="field-label">Default post visibility</span>
    <select name="visibility">
      {% for option in visibilities %}
      <option value="{{ option }}"{% if values.visibility == option %} selected{% endif %}>{{ option }}</option>
      {% endfor %}
    </select>
  </label>
  <label class="field checkbox">
    <input type="checkbox" name="sensitive"{% if values.sensitive %} checked{% endif %}>
    <span class="field-label">Mark media as sensitive by default</span>
  </label>
  <label class="field">
    <span class="field-label">Default posting language</span>
    <select name="language">
      {% for code in languages %}
      <option value="{{ code }}"{% if values.language == code %} selected{% endif %}>{{ code }}</option>
      {% endfor %}
    </select>
  </label>
  <button type="submit">Save</button>
</form>
